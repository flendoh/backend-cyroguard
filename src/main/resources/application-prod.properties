# ===============================
# TODO: Configurar antes de desplegar
# neonDB connection string:
# jdbc:postgresql://<host>:<port>/<database>?sslmode=require

spring.datasource.url=jdbc:postgresql://${NEON_DB_HOST:your-neon-host}.neon.tech:${NEON_DB_PORT:5432}/${NEON_DB_NAME:cryoguard}?sslmode=require
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${NEON_DB_USER:your-neon-username}
spring.datasource.password=${NEON_DB_PASSWORD:your-neon-password}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate

spring.h2.console.enabled=false

# JWT Configuration
authorization.jwt.secret=${JWT_SECRET:your-256-bit-secret-key-for-jwt-token-signing-must-be-long-enough}
authorization.jwt.expiration.days=30

# Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.security=WARN